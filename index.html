<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Globe RTS</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="globe-canvas"></canvas>

    <!-- Player-name labels positioned over the globe -->
    <div id="name-labels"></div>

    <!-- Live attack indicator labels (troop counts at arrow midpoints) -->
    <div id="attack-indicators"></div>

    <!-- Start menu -->
    <div id="start-menu">
      <div class="start-box hud-panel">
        <h1 class="start-title">Globe RTS</h1>
        <p class="start-subtitle">Conquer the world, tile by tile.</p>

        <label class="cfg-row">
          <span class="cfg-label">Name</span>
          <input id="cfg-name" type="text" maxlength="20" value="Commander" />
        </label>

        <div class="cfg-row">
          <span class="cfg-label">Color</span>
          <div id="cfg-color-picker" class="color-picker"></div>
        </div>

        <label class="cfg-row">
          <span class="cfg-label">Globe</span>
          <select id="cfg-globe">
            <option value="earth">Earth</option>
          </select>
        </label>

        <label class="cfg-row">
          <span class="cfg-label">Bots</span>
          <input id="cfg-bots" type="range" min="1" max="100" value="10" />
          <span id="cfg-bots-val" class="cfg-value">10</span>
        </label>

        <button id="cfg-start" class="start-btn">Start Game</button>
      </div>
    </div>

    <!-- Countdown overlay -->
    <div id="countdown-overlay" style="display:none">
      <div class="countdown-box hud-panel">
        <div class="countdown-label">Pick your starting tile</div>
        <div id="countdown-timer">5</div>
      </div>
    </div>

    <div id="hud" style="display:none">
      <!-- Top bar: player stats -->
      <div id="top-bar">
        <div id="player-stats" class="hud-panel" style="display:none">
          <div class="stat">
            <span class="stat-label">Territory</span>
            <div class="stat-bar-wrap">
              <div id="territory-bar" class="stat-bar"></div>
            </div>
            <span id="territory-pct" class="stat-value">0%</span>
          </div>
          <div class="stat-row">
            <div class="stat-compact" title="Current troop pool / cap (Pmax = kp · N^α)">
              <span class="stat-label">Troops</span>
              <span id="troops-value" class="stat-value">50</span>
              <span class="stat-divider">/</span>
              <span id="cap-value" class="stat-value">0</span>
            </div>
            <div class="stat-compact">
              <span class="stat-label">Gold</span>
              <span id="gold-value" class="stat-value">0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom panel: controls + info -->
      <div id="bottom-bar">
        <div id="controls-panel" class="hud-panel" style="display:none">
          <div class="slider-group">
            <label>Attack <span id="attack-allocation-label">50%</span></label>
            <input type="range" id="attack-allocation" min="0" max="100" value="50" />
            <span class="slider-hint">% of population per attack</span>
          </div>
        </div>

        <div id="info-panel" class="hud-panel">
          <span id="tile-info">Right-click drag to spin · Left-click a land tile to spawn</span>
        </div>
      </div>

      <!-- Leaderboard -->
      <div id="leaderboard" class="hud-panel" style="display:none">
        <div class="leaderboard-title">Leaderboard</div>
        <div id="leaderboard-list"></div>
      </div>

      <!-- Victory overlay -->
      <div id="victory-overlay" style="display:none">
        <div id="victory-box" class="hud-panel">
          <div id="victory-title">Victory!</div>
          <div id="victory-message"></div>
          <button id="restart-btn" onclick="location.reload()">Play Again</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
